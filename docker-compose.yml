services:
  db:
    container_name: db
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ensim1995
      MYSQL_DATABASE: kfet
      MYSQL_USER: admin9988
      MYSQL_PASSWORD: ensim1995
      MYSQL_ROOT_HOST: '%' 
    ports:
      - "9906:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./bdd/backup19-02-2026.sql:/docker-entrypoint-initdb.d/01-backup.sql
      - ./db_migration.sql:/docker-entrypoint-initdb.d/02-migration.sql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - 8003:80
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
  php-apache:
    container_name: php-apache
    build:
      context: ./
      dockerfile: Dockerfile
    depends_on:
      - db
    volumes:
      - ./:/var/www/html/
    ports:
      - 8001:80
volumes:
  db_data: {}